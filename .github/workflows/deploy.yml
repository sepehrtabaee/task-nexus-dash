name: Deploy via Tailscale

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Test connection
        run: ping -c 3 ${{ secrets.PI_HOST }}

      - name: Copy files
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PI_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          scp -o StrictHostKeyChecking=no -r ./* \
            ${{ secrets.PI_USER }}@${{ secrets.PI_HOST }}:/home/lordstz/task-manager-pi

      - name: Run dashboard script on Pi
        run: |
          ssh ${{ secrets.PI_USER }}@${{ secrets.PI_HOST }} \
          "cd ~/task-manager-pi && /home/lordstz/start-dashboard.sh"